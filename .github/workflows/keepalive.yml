name: Supabase keep-alive

# Free Supabase projects pause after ~7 days with no activity. This pings the
# database once a day so it always registers activity and never sleeps.
# The key below is the PUBLISHABLE key — it is browser-safe and Row-Level
# Security limits it to reading a single non-sensitive heartbeat row.

on:
  schedule:
    - cron: "17 12 * * *"   # daily at 12:17 UTC (off the top of the hour to avoid delays)
  workflow_dispatch:          # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase heartbeat
        env:
          SUPABASE_URL: https://uwewlcjouzkykzyuxzow.supabase.co
          SUPABASE_KEY: sb_publishable_EEcUb26HzVB-JRQwGs6NSw_TB2xIRol
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/heartbeat?select=last_ping" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "Supabase responded: HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Keep-alive ping failed (expected HTTP 200, got $code)"
            exit 1
          fi
          echo "Keep-alive OK — project will stay awake."
